name: Issue assignment

on:
    issues:
        types: [opened]

jobs:
    auto-assign:
        runs-on: ubuntu-24.04  # using python 3.12
        permissions:
            issues: write
        steps:
            - name: 'Auto assign issue'
              uses: pozil/auto-assign-issue@39c06395cbac76e79afc4ad4e5c5c6db6ecfdd2e # v2.2.0
              with:
                  assignees: richardbluestone
